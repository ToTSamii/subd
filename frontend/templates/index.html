<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-Обучение - Курсы программирования</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo" id="logoLink">
                    <i class="fas fa-laptop-code"></i>
                    <span>IT-Обучение</span>
                </div>
                <div class="user-nav" id="userNav">
                    <a href="index.html" id="homeLink">Главная</a>
                    <a href="schedule.html" id="scheduleLink">Расписание</a>
                    <a href="attendance.html" id="progressLink">Успеваемость</a>
                    <a href="#" id="groupLink">Группа</a>
                    <a href="#" id="myCoursesLink">Мои курсы</a>
                    <a href="#" id="usersLink" style="display: none;">Пользователи</a>
                    <a href="#" id="coursesLink" style="display: none;">Курсы</a>
                </div>
                    
                <div id="authButtons">
                    <button class="btn-outline" id="loginBtn">Вход</button>
                    <button class="btn-primary" id="registerBtn">Регистрация</button>
                </div>
                
                <div id="userInfo" style="display: none;">
                    <div class="user-profile" id="userProfileClick">
                        <div class="user-avatar" id="userAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span id="userName"></span>
                        <button class="btn-outline" id="logoutBtn">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1>Прокачай свои <span class="gradient">IT-навыки</span></h1>
                    <p>Актуальные курсы от практиков. Выбирай направление и становись профессионалом уже сегодня!</p>
                    <button class="btn-primary" id="exploreBtn">Исследовать курсы</button>
                </div>
            </div>
        </section>

        <section class="courses-section" id="coursesSection">
            <div class="container">
                <div class="section-header">
                    <h2>IT-курсы</h2>
                    <p>Выберите программу обучения</p>
                </div>
                <div id="loading" class="loading">Загрузка курсов...</div>
                <div id="errorMsg" class="error" style="display: none;"></div>
                <div id="coursesGrid" class="courses-grid"></div>
            </div>
        </section>
    </main>

    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Вход</h2>
            <div id="loginMessage" class="form-message" style="display: none;"></div>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Логин" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно регистрации -->
    <div id="registerModal" class="modal">
        <div class="modal-content register-modal">
            <span class="close">&times;</span>
            <h2>Регистрация</h2>
            <div id="registerMessage" class="form-message" style="display: none;"></div>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Логин *</label>
                        <input type="text" id="regLogin" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="regEmail" placeholder="example@mail.com" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Пароль *</label>
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов" required>
                    </div>
                    <div class="form-group">
                        <label>Подтверждение пароля *</label>
                        <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="regFirstName" placeholder="Иван" required>
                    </div>
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="regLastName" placeholder="Иванов">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Отчество</label>
                        <input type="text" id="regMiddleName" placeholder="Иванович">
                    </div>
                    <div class="form-group">
                        <label>Дата рождения</label>
                        <input type="date" id="regBirthDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>Фото (URL)</label>
                    <input type="url" id="regPhoto" placeholder="https://example.com/photo.jpg">
                </div>
                <button type="submit" class="btn-primary register-submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
