<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание - IT-Обучение</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .schedule-container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-top: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        
        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .schedule-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        .schedule-title i {
            color: #2563eb;
            margin-right: 10px;
        }
        
        .role-badge {
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .btn-add {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .btn-add:hover {
            background: #1d4ed8;
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .schedule-table th,
        .schedule-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .schedule-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #475569;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .schedule-table tr:hover {
            background: #f8fafc;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-edit {
            background: #eab308;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-edit:hover {
            background: #ca8a04;
        }
        
        .btn-delete:hover {
            background: #dc2626;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        
        .loading-spinner i {
            font-size: 2rem;
            color: #2563eb;
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background: white;
            margin: 100px auto;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            border-radius: 16px;
        }
        
        .modal-content h3 {
            margin-bottom: 24px;
            font-size: 1.3rem;
        }
        
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        
        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
        }
        
        .close-modal:hover {
            color: #1e293b;
        }
        
        @media (max-width: 768px) {
            .schedule-container {
                padding: 16px;
                overflow-x: auto;
            }
            .schedule-table {
                font-size: 0.85rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo" id="logoLink">
                    <i class="fas fa-laptop-code"></i>
                    <span>IT-Обучение</span>
                </div>
                <div class="user-nav" id="userNav">
                    <a href="index.html">Главная</a>
                    <a href="schedule.html" id="scheduleLink">Расписание</a>
                    <a href="attendance.html" id="progressLink">Успеваемость</a>
                    <a href="group.html" id="groupLink">Группа</a>
                    <a href="my-course.html" id="myCoursesLink">Мои курсы</a>
                    <a href="admin-users.html" id="usersLink" style="display: none;">Пользователи</a>
                    <a href="admin-courses.html" id="coursesLink" style="display: none;">Курсы</a>
                </div>
                
                <div id="userInfo">
                    <div class="user-profile" id="userProfileClick">
                        <div class="user-avatar" id="userAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span id="userName"></span>
                        <button class="btn-outline" id="logoutBtn">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="schedule-container">
                <div class="schedule-header">
                    <div class="schedule-title">
                        <i class="fas fa-calendar-alt"></i> Расписание занятий
                    </div>
                    <div class="role-badge" id="roleBadge">Загрузка...</div>
                </div>
                
                <div id="addButtonContainer" style="display: none;">
                    <button class="btn-add" id="addScheduleBtn">
                        <i class="fas fa-plus"></i> Добавить занятие
                    </button>
                </div>
                
                <div id="loadingState" class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Загрузка расписания...</p>
                </div>
                
                <div id="errorState" class="error-message" style="display: none;"></div>
                
                <div id="scheduleContent" style="display: none;">
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Дата и время</th>
                                <th>Тема занятия</th>
                                <th >Группа</th>
                                <th id="teacherColumn">Преподаватель</th>
                                <th id="actionsColumn">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <i class="fas fa-calendar-times"></i>
                        <p>Расписание не найдено</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно добавления/редактирования -->
    <div id="scheduleModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeScheduleModal()">&times;</span>
            <h3 id="modalTitle">Добавить занятие</h3>
            <form id="scheduleForm">
                <input type="text" id="topic" placeholder="Тема занятия" required>
                <input type="datetime-local" id="dateTime" required>
                <select id="groupId" required>
                    <option value="">Выберите группу</option>
                </select>
                <div class="modal-buttons">
                    <button type="button" class="btn-outline" onclick="closeScheduleModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/schedule.js"></script>
</body>
</html>
