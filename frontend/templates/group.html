<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя группа - IT-Обучение</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .group-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 40px;
            color: white;
            margin-bottom: 32px;
        }

        .group-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .group-header .course-name {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 16px;
        }

        .group-dates {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .date-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .info-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .info-card h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #eef2f8;
            padding-bottom: 12px;
        }

        .info-card h3 i {
            color: #2563eb;
        }

        .students-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .student-item:hover {
            transform: translateX(4px);
            background: #f1f5f9;
        }

        .student-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
        }

        .student-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .student-login {
            font-size: 0.85rem;
            color: #64748b;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #f8fafc;
            border-radius: 16px;
        }

        .empty-state i {
            font-size: 4rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .empty-state p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 60px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .back-link:hover {
            color: #1d4ed8;
        }

        .current-user-badge {
            background: #eef2ff;
            border-left: 4px solid #2563eb;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo" id="logoLink">
                    <i class="fas fa-laptop-code"></i>
                    <span>IT-Обучение</span>
                </div>
                <div class="user-nav" id="userNav">
                    <a href="index.html" id="homeLink">Главная</a>
                    <a href="schedule.html" id="scheduleLink">Расписание</a>
                    <a href="attendance.html" id="progressLink">Успеваемость</a>
                    <a href="group.html" id="groupLink">Моя группа</a>
                    <a href="my-course.html" id="myCoursesLink">Мои курсы</a>
                    <a href="#" id="usersLink" style="display: none;">Пользователи</a>
                    <a href="#" id="coursesLink" style="display: none;">Курсы</a>
                </div>
                    
                <div id="authButtons">
                    <button class="btn-outline" id="loginBtn">Вход</button>
                    <button class="btn-primary" id="registerBtn">Регистрация</button>
                </div>
                
                <div id="userInfo" style="display: none;">
                    <div class="user-profile" id="userProfileClick">
                        <div class="user-avatar" id="userAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span id="userName"></span>
                        <button class="btn-outline" id="logoutBtn">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="profile-main">
        <div class="container group-container">
            <div id="groupContent">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                    <p>Загрузка информации о группе...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Вход</h2>
            <div id="loginMessage" class="form-message" style="display: none;"></div>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Логин" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно регистрации -->
    <div id="registerModal" class="modal">
        <div class="modal-content register-modal">
            <span class="close">&times;</span>
            <h2>Регистрация</h2>
            <div id="registerMessage" class="form-message" style="display: none;"></div>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Логин *</label>
                        <input type="text" id="regLogin" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="regEmail" placeholder="example@mail.com" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Пароль *</label>
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов" required>
                    </div>
                    <div class="form-group">
                        <label>Подтверждение пароля *</label>
                        <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="regFirstName" placeholder="Иван" required>
                    </div>
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="regLastName" placeholder="Иванов">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Отчество</label>
                        <input type="text" id="regMiddleName" placeholder="Иванович">
                    </div>
                    <div class="form-group">
                        <label>Дата рождения</label>
                        <input type="date" id="regBirthDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>Фото (URL)</label>
                    <input type="url" id="regPhoto" placeholder="https://example.com/photo.jpg">
                </div>
                <button type="submit" class="btn-primary register-submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/group.js"></script>
</body>
</html>
