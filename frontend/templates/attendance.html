<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успеваемость - IT-Обучение</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .attendance-container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-top: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .attendance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .attendance-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }
        .attendance-title i {
            color: #2563eb;
            margin-right: 10px;
        }
        .role-badge {
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .teacher-panel {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .teacher-panel h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
            color: #1e293b;
        }
        .form-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 6px;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.9rem;
            background: white;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
        }
        .btn-add-mark {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 42px;
        }
        .btn-add-mark:hover {
            background: #1d4ed8;
        }
        .marks-table {
            width: 100%;
            border-collapse: collapse;
        }
        .marks-table th,
        .marks-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .marks-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #475569;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .marks-table tr:hover {
            background: #f8fafc;
        }
        .grade-value {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .grade-good .grade-value {
            background: #dcfce7;
            color: #166534;
        }
        .grade-normal .grade-value {
            background: #fef9c3;
            color: #854d0e;
        }
        .grade-bad .grade-value {
            background: #fee2e2;
            color: #991b1b;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-edit {
            background: #eab308;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-edit:hover {
            background: #ca8a04;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner i {
            font-size: 2rem;
            color: #2563eb;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 100px auto;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            position: relative;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .modal-content input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
        }
        .close-modal:hover {
            color: #1e293b;
        }
        .course-name {
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #475569;
        }
        
        @media (max-width: 768px) {
            .attendance-container {
                padding: 16px;
                overflow-x: auto;
            }
            .marks-table {
                font-size: 0.85rem;
            }
            .form-row {
                flex-direction: column;
            }
            .btn-add-mark {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo" id="logoLink">
                    <i class="fas fa-laptop-code"></i>
                    <span>IT-Обучение</span>
                </div>
                <div class="user-nav" id="userNav">
                    <a href="index.html">Главная</a>
                    <a href="schedule.html" id="scheduleLink">Расписание</a>
                    <a href="attendance.html" id="progressLink">Успеваемость</a>
                    <a href="#" id="groupLink">Группа</a>
                    <a href="#" id="myCoursesLink">Мои курсы</a>
                    <a href="#" id="usersLink" style="display: none;">Пользователи</a>
                    <a href="#" id="coursesLink" style="display: none;">Курсы</a>
                </div>
                <div id="userInfo">
                    <div class="user-profile" id="userProfileClick">
                        <div class="user-avatar" id="userAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span id="userName"></span>
                        <button class="btn-outline" id="logoutBtn">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="attendance-container">
                <div class="attendance-header">
                    <div class="attendance-title">
                        <i class="fas fa-chart-line"></i> Успеваемость
                    </div>
                    <div class="role-badge" id="roleBadge">Загрузка...</div>
                </div>
                
                <div id="teacherPanel" class="teacher-panel" style="display: none;">
                    <h3><i class="fas fa-plus-circle"></i> Поставить оценку</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Группа</label>
                            <select id="groupSelect">
                                <option value="">Выберите группу</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Студент</label>
                            <select id="studentSelect">
                                <option value="">Сначала выберите группу</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Оценка (2-5)</label>
                            <input type="number" id="gradeInput" min="2" max="5" step="1" placeholder="Оценка">
                        </div>
                        <button class="btn-add-mark" id="addMarkBtn">
                            <i class="fas fa-save"></i> Поставить оценку
                        </button>
                    </div>
                </div>
                
                <div id="loadingState" class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Загрузка успеваемости...</p>
                </div>
                
                <div id="errorState" class="error-message" style="display: none;"></div>
                
                <div id="attendanceContent" style="display: none;">
                    <table class="marks-table">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Курс</th>
                                <th>Оценка</th>
                                <th id="actionsColumn" style="display: none;">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="marksTableBody">
                            <tr>
                                <td colspan="3" class="empty-message">Выберите группу и студента</td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <i class="fas fa-chart-simple"></i>
                        <p>Нет данных об успеваемости</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeEditModal">&times;</span>
            <h3><i class="fas fa-edit"></i> Редактировать оценку</h3>
            <div class="course-name">
                <strong>Курс:</strong> <span id="editCourseName"></span>
            </div>
            <input type="hidden" id="editAttendanceId">
            <div class="form-group">
                <label>Оценка (2-5)</label>
                <input type="number" id="editGrade" min="2" max="5" step="1" placeholder="Оценка">
            </div>
            <div class="modal-buttons">
                <button class="btn-outline" id="cancelEditBtn">Отмена</button>
                <button class="btn-primary" id="saveEditBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="../js/attendance.js"></script>
</body>
</html>
